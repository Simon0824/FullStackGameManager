


<div class="row justify-content-center">
  <div class="card p-1 m-1">
      <div class="card-header">
    <input type="text" class="form-control" placeholder="Title" name="title" [(ngModel)]="newGame.title"/>
    <input type="text" class="form-control" placeholder="Genre" name="genre" [(ngModel)]="newGame.genre"/>
    <input type="date" class="form-control" name="date" [(ngModel)]="newGame.releaseDate"/>
    <button class="btn btn-success m-1" (click)="addGame()">Add</button>
  </div>
  <div class="card-body">
    <ul class="list-group">
  <li class="list-group-item" *ngFor="let g of games">
    {{ g.title }} ({{ g.genre }}) - {{ g.releaseDate }}
    <button class="btn btn-danger m-1" (click)="delete(g.id)">Delete</button>
  </li>
</ul>
</div>
  </div>
  <button class="btn btn-primary col-3" (click)="loadGames()">Refresh</button>
</div>
